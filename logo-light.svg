<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>SkyVault (light theme)</title>
  <desc>SkyVault logo for light backgrounds — navy plane and dark wordmark with warm gold accent</desc>

  <!-- Trail -->
  <path d="M100 800 Q220 720 340 790 Q460 870 580 760 Q700 650 610 470"
        stroke="#1d3759" stroke-width="14"
        stroke-dasharray="2 26" stroke-linecap="round" fill="none"/>

  <!-- Plane (navy facets for light bg) -->
  <g transform="translate(580, 140)">
    <path d="M0 320 L300 0 L170 200 Z" fill="#1d3759"/>
    <path d="M170 200 L300 0 L220 400 Z" fill="#0a1628"/>
    <path d="M0 320 L170 200 L90 290 Z" fill="#03080f"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="900" text-anchor="middle"
        font-family="Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="130" font-weight="800" letter-spacing="-3">
    <tspan fill="#0a1628">Sky</tspan><tspan fill="#c97f00">Vault</tspan>
  </text>
</svg>
